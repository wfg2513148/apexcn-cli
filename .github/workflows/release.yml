name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run check:release
      - name: Build release package
        run: |
          node scripts/check-release-artifacts.mjs --expected-version "${GITHUB_REF_NAME#v}" --artifacts-dir artifacts
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/apexcn-cli.tgz \
            artifacts/install-agent.sh \
            artifacts/install-agent.ps1 \
            artifacts/checksums.txt \
            artifacts/apexcn-cli.tgz.sha256 \
            artifacts/install-agent.sh.sha256 \
            artifacts/install-agent.ps1.sha256 \
            --title "$GITHUB_REF_NAME" \
            --notes "apexcn-cli release $GITHUB_REF_NAME"
