name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag for manual fallback publishing
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run check:release
      - name: Build release package
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          node scripts/check-release-artifacts.mjs --expected-version "${RELEASE_TAG#v}" --artifacts-dir artifacts
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            artifacts/apexcn-cli.tgz \
            artifacts/install-agent.sh \
            artifacts/install-agent.ps1 \
            artifacts/checksums.txt \
            artifacts/apexcn-cli.tgz.sha256 \
            artifacts/install-agent.sh.sha256 \
            artifacts/install-agent.ps1.sha256 \
            --title "$RELEASE_TAG" \
            --notes "apexcn-cli release $RELEASE_TAG"
