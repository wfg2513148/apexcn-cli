name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run check:release
      - run: npm run eval:rag
      - run: node scripts/eval-rag.mjs --report --output reports/rag-eval.json
      - uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report
          path: reports/rag-eval.json
  windows-installer:
    name: Windows 2022 / ${{ matrix.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows PowerShell 5.1
            id: windows-powershell-5-1
            executable: powershell.exe
          - name: PowerShell 7
            id: powershell-7
            executable: pwsh.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run test/install-agent.test.ts test/lifecycle-agent.test.ts test/release-version.test.ts
        env:
          APEXCN_TEST_POWERSHELL: ${{ matrix.executable }}
          APEXCN_WINDOWS_REPORT_PATH: reports/${{ matrix.id }}-lifecycle.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.id }}-lifecycle
          path: reports/${{ matrix.id }}-lifecycle.json
          if-no-files-found: warn
